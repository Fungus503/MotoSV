<body class="bg-background text-on-background min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Ambient Decoration -->
<div class="fixed top-0 left-0 w-full h-1/2 pointer-events-none opacity-30">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary/20 blur-[120px]"></div>
<div class="absolute top-[-5%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container/30 blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-edge-margin py-xl relative z-10">
<!-- Logo Section -->
<div class="mb-xl animate-[fadeInUp_0.8s_ease-out]">

</div>

<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-xs tracking-tight">
                Bienvenido a MotoSV
            </h1>
<p class="font-body-lg text-body-lg text-secondary opacity-80 px-sm">
                Tu viaje rápido y seguro comienza aquí
            </p>
</div>
<!-- Login Form Container -->
<div class="w-full max-w-md space-y-md animate-[fadeInUp_1s_ease-out]">
<!-- Phone Input Component -->
<div class="group flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-secondary-fixed-dim px-1">Número de teléfono</label>
<div class="flex h-14 bg-surface-container-lowest rounded-xl border border-outline-variant focus-within:border-primary-container focus-within:ring-1 focus-within:ring-primary-container transition-all overflow-hidden shadow-sm">
<!-- Country Selector Placeholder -->
<button class="flex items-center gap-xs px-md border-r border-outline-variant/30 hover:bg-surface-container-low transition-colors">
<span class="text-lg">🇸🇻</span>
<span class="font-label-lg text-label-lg">+503</span>
<span class="material-symbols-outlined text-[18px]">keyboard_arrow_down</span>
</button>
<input class="flex-grow bg-transparent border-none focus:ring-0 px-md font-body-lg text-body-lg text-on-surface placeholder:text-outline/50" placeholder="7000 0000" type="tel">
</div>
</div>
<!-- Primary Action Button -->
<button class="btn-hover-effect w-full h-14 bg-primary-container text-on-primary-container font-label-lg text-body-lg rounded-xl flex items-center justify-center gap-sm shadow-lg shadow-primary-container/20 transition-all">
                Continuar

</button>
<!-- Divider -->
<div class="flex items-center gap-md py-md">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="font-label-md text-label-md text-outline uppercase tracking-widest">O continúa con</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>

<script>
        // Micro-interactions and entry animations
        document.addEventListener('DOMContentLoaded', () => {
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeInUp {
                    from {
                        opacity: 0;
                        transform: translateY(20px);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }
            `;
            document.head.appendChild(style);

            // Add haptic-like visual feedback to all interactive elements
            const interactables = document.querySelectorAll('button, a');
            interactables.forEach(item => {
                item.addEventListener('touchstart', () => {
                    item.style.transition = 'transform 0.1s cubic-bezier(0.4, 0, 0.2, 1)';
                });
            });
        });
    </script>
