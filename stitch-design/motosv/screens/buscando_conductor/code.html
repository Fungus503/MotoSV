<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Radar Pulse Animation */
        @keyframes radar-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }
        .animate-radar {
            animation: radar-pulse 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }
        .animate-radar-delayed {
            animation: radar-pulse 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite 1.5s;
        }

        /* Scanline effect for premium feel */
        .scanline {
            background: linear-gradient(to bottom, transparent 0%, rgba(0, 200, 83, 0.05) 50%, transparent 100%);
            background-size: 100% 4px;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* Custom Scrollbar for hidden nav areas */
        ::-webkit-scrollbar { display: none; }

        .glass-panel {
            background: rgba(247, 249, 252, 0.85);
            backdrop-filter: blur(20px);

<div class="scanline"></div>
<script>
        // Micro-interaction: Update the "searching" text every few seconds to feel alive
        const statusTexts = [
            "Localizando pilotos cercanos...",
            "Validando disponibilidad...",
            "Optimizando tu ruta...",
            "Casi listo...",
            "Contactando conductores..."
        ];
        let currentTextIndex = 0;
        const statusLabel = document.querySelector('.whitespace-nowrap.bg-inverse-surface\\/90');
        
        setInterval(() => {
            currentTextIndex = (currentTextIndex + 1) % statusTexts.length;
            statusLabel.style.opacity = 0;
            setTimeout(() => {
                statusLabel.textContent = statusTexts[currentTextIndex];
                statusLabel.style.opacity = 1;
                statusLabel.style.transition = 'opacity 0.3s ease';
            }, 300);
        }, 4000);

        // Map movement effect (subtle parallax)
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            document.querySelector('[data-location]').style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
            document.querySelector('[data-location]').style.transition = 'transform 0.1s linear';
        });
    </script>
