<body class="bg-surface-bright text-on-surface min-h-screen flex flex-col items-center justify-center p-edge-margin overflow-x-hidden">
<!-- Atmospheric Background Decoration -->
<div class="fixed inset-0 z-0 pointer-events-none opacity-40">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-tertiary-container/10 rounded-full blur-[100px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-md relative z-10 animate-fade-in transition-all duration-700">
<!-- Header Branding (Suppressed Shared Nav for focus) -->
<header class="mb-xl text-center">
<h1 class="font-display-md text-display-md text-primary tracking-tighter mb-base">MotoSV</h1>
<p class="font-body-lg text-body-lg text-secondary">Join the premium ride community</p>
</header>
<!-- Registration Card -->
<div class="glass-panel p-lg rounded-2xl shadow-[0px_4px_20px_rgba(13,27,42,0.08)] flex flex-col gap-lg">
<!-- Registration Form -->
<form class="flex flex-col gap-md" id="registrationForm" onsubmit="return false">
<!-- Name Row -->
<div class="flex gap-md">
<!-- First Name -->
<div class="flex-1">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs ml-base" for="firstName">First Name</label>
<div class="relative group">
<input class="w-full h-14 bg-surface border-none rounded-xl px-md font-body-lg text-body-lg ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary-container transition-all outline-none" id="firstName" name="firstName" placeholder="Alex" type="text">
</div>
</div>
<!-- Last Name -->
<div class="flex-1">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs ml-base" for="lastName">Last Name</label>
<div class="relative group">
<input class="w-full h-14 bg-surface border-none rounded-xl px-md font-body-lg text-body-lg ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary-container transition-all outline-none" id="lastName" name="lastName" placeholder="Rivera" type="text">
</div>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs ml-base" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/50">mail</span>
<input class="w-full h-14 bg-surface border-none rounded-xl pl-2xl pr-md font-body-lg text-body-lg ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary-container transition-all outline-none" id="email" name="email" placeholder="alex@motosv.com" type="email">
</div>
</div>
<!-- Phone -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs ml-base" for="phone">Phone Number</label>
<div class="relative flex">
<div class="absolute left-md top-1/2 -translate-y-1/2 flex items-center gap-base">
<span class="material-symbols-outlined text-on-surface-variant/50">phone_iphone</span>
<span class="font-body-md text-body-md text-on-surface-variant">+503</span>
</div>
<input class="w-full h-14 bg-surface border-none rounded-xl pl-[100px] pr-md font-body-lg text-body-lg ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary-container transition-all outline-none" id="phone" name="phone" placeholder="7000 0000" type="tel">
</div>
</div>
<!-- Password -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs ml-base" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/50">lock</span>
<input class="w-full h-14 bg-surface border-none rounded-xl pl-2xl pr-md font-body-lg text-body-lg ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary-container transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<p class="mt-xs ml-base font-label-md text-label-md text-on-surface-variant/60">Minimum 8 characters with one number.</p>
</div>
<!-- Terms -->
<div class="flex items-start gap-sm mt-xs">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-primary-container focus:ring-primary" id="terms" type="checkbox">
<label class="font-body-md text-body-md text-on-surface-variant" for="terms">
                        I agree to the <a class="text-primary font-bold" href="#">Terms of Service</a> and <a class="text-primary font-bold" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary Action -->
<button class="mt-md w-full h-14 bg-primary-container text-on-primary-container font-headline-lg-mobile text-headline-lg-mobile rounded-xl shadow-lg shadow-primary-container/20 btn-active transition-all hover:brightness-105 active:scale-[0.98]" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="font-label-lg text-label-lg text-on-surface-variant/40">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Social/Login Link -->
<div class="text-center">
<p class="font-body-lg text-body-lg text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-bold ml-base hover:underline transition-all" href="#">Log In</a>
</p>

</div>

<footer class="mt-xl flex flex-col items-center gap-sm">
<div class="flex items-center gap-xs text-on-surface-variant/50">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="font-label-md text-label-md tracking-widest">SECURE 256-BIT ENCRYPTION</span>
</div>
<div class="flex gap-lg mt-md grayscale opacity-40">
<img class="h-6" data-alt="Minimalist Mastercard logo icon in a clean vector style, monochrome on a light background for professional financial integration." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBFTxD7yn1f96sFTNKVqdpiAruyhBVhfMr9XbXtHK5ECwa0AAERs7MECI7nwLvfOXMPyKgFBJGc5Lgc_71FXGg98ov73tbqTMXcaxfcTH_MCWgi8MOT8SWm6Enh1Cb9uHxBD-7Vb-iwUPMuaIuIfOl5BVu2Sx0JdL06vLPRkiFZwe8AnhM5dgrCZV24eL428LIi6P6ASP1rgKGdferxV3QrXi1edtBd6AxFyVG3O8pzoU-aTNMjIhjbYQt7TlgU5PLh8ODwyPKvhg">
<img class="h-6" data-alt="Minimalist Visa logo icon in a clean vector style, monochrome on a light background for professional financial integration." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSsWG8dxZHlp-94bz3Ziimsd7M82LZ5l0mJ-Nsv94kgahXT4miFXRLy0sztHor1yStwTSqeHsu-voViEV6vN3vTLs1r_seROi6fPhEOtUZOGzHkWYn_pXxUEMN9KypjKrRkdpD6s76h-61jbUuAsGCr6_tULDM15WGYT3d8ptnjGB_8U0dldUo2psvn5I3MlwtKfff38RaAFiNW4QzfSS-nKhFwNXtGh6jNGere8q5jxzksAcBj-FzX6Hx6WWB-BxOQCbykxmHIg">
</div>
</footer>
</main>
<!-- Visual Polish: Decorative Element -->
<div class="fixed bottom-0 right-0 w-1/3 h-1/2 z-0 pointer-events-none overflow-hidden hidden md:block">
<img class="absolute bottom-0 right-[-10%] w-full object-contain opacity-20" data-alt="A side view of a sleek, futuristic high-end motorcycle in a minimalist studio setting. The lighting is dramatic and clean, emphasizing polished metallic surfaces and carbon fiber details. The background is a soft, warm neutral grey that blends seamlessly into the UI's light mode aesthetic, conveying a sense of luxury and velocity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4_4rfgFj81BlYjDJ_RMpdOV2_K6j_KEnDTpyFLSbJYN1_Q_aGr17ekiJD2JZjoeLEN_gVxtdxDIOX8T8NJYVDUaExFzAa0jDn1OejgvxJZqmYcVNBc2_q71oPb6d7W2wA6Qkg-QSYoegX-mRmiBQ54L3v-OvgZSu3tGABjXh97mb8JwbfjF4G5IOD8IYqJFdgu_GR45uH1liG2BAUkonqxv7WKJ5zE8J0_eodgw65UIyr1Vz4z9zxXpuvEzoYyv73g2kuT4TrIA">
</div>
<script>
        // Micro-interaction for input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.glass-panel').classList.add('shadow-xl');
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.glass-panel').classList.remove('shadow-xl');
            });
        });

        // Simple form validation feedback
        const form = document.getElementById('registrationForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            
            // Artificial Loading State
            btn.innerHTML = `<span class="flex items-center justify-center gap-sm">
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Processing...
            </span>`;
            btn.classList.add('opacity-80', 'pointer-events-none');

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('opacity-80', 'pointer-events-none');
                alert('In a real app, this would send your data to MotoSV servers! Check the UI details for premium feel.');
            }, 1500);
        });
    </script>
</body></html>
