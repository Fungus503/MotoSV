<style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0D1B2A;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @keyframes soft-pulse {
            0%, 100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 0px rgba(0, 200, 83, 0)); }
            50% { transform: scale(1.05); opacity: 0.95; filter: drop-shadow(0 0 15px rgba(0, 200, 83, 0.3)); }
        }

        @keyframes loading-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 0.7; transform: translateY(0); }
        }

        .animate-soft-pulse {
            animation: soft-pulse 3s ease-in-out infinite;
        }

        .shimmer-bar {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
        }

        .shimmer-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 25%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 200, 83, 0.4), transparent);
            animation: loading-shimmer 2s infinite linear;
        }

        .slogan-fade {
            animation: fade-in-up 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }
    </style>
