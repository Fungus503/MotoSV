<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }
        
        .glass-sheet {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .ride-option-active {
            border: 2px solid #00c853;
            background: rgba(0, 200, 83, 0.05);
        }

        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }

        .location-dot::before {
            content: '';
            position: absolute;
            left: -8px;
            top: -8px;
            width: 32px;
            height: 32px;
            background-color: #00c853;
            border-radius: 50%;
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }

        .route-path {
            stroke-dasharray: 8;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -100; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface overflow-hidden h-screen w-full select-none">
<!-- Top App Bar (Shared Component Strategy) -->

<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<div class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">MotoSV</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img class="w-full h-full object-cover" data-alt="A clean, professional headshot of a Hispanic male rider in his late 20s, smiling confidently. He is wearing a sleek, modern black motorcycle jacket with subtle green accents that match the MotoSV brand colors. The background is a soft-focus urban setting at dusk, with warm city lights creating a premium bokeh effect." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBy6JqI93NDyje3ILaZqyhW5PE71Fz8cqlZvNTU6XTBXYt3EkhnRHrUKvx3jRJHAjhBr0qCpG8y9MFn-2hB5MJ4w3L3wgmkMPYAnRkJkesEcT5gbGUuhTKKr9NM8HN1sJIWzU0cudI09iTLi7iGZjV6mG_AsstHn0qb8cJLqzAgBDJTHnWScxAcuFzFUW4R6QuyboC8AcTIp6ynu_z8LPC75dbHgLWNLtV22JoMFLEU0WkMxYtNxrJNibeMLZUtAnULuvDgpPEwZQ">
</div>
</header>
<!-- Map Layer (Full Screen) -->
<main class="fixed inset-0 z-0">
<div class="relative w-full h-full">
<!-- Map Visualization -->
<div class="absolute inset-0 grayscale-[0.2]" data-location="San Salvador, El Salvador" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBwj_Rq_jK9MPEvfp3JlY5DWkMSke2yecTqg4rCPoty92A8HoSruCI7XJcud1ClW3c2xH6bLF2G6hlDzaxJ3YRljAj4BnW3H3sQnNfVk4kDu2_XlV2hwl3UqLu8LoZHyVdLil-hgPXXV3oClBn3i2Xk3rfOEICqzQ-TicH1csuVh5svcNYFKguYze7iGgfk6EH21nSYhguEH1wRoKKuvvb4IGtHyjMzsky4gv47CkAN8ouvJ4MRCC6PGWhKgf1T--2c-PaPdZirKg')">
</div>
<!-- SVG Overlay for Route -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 400 800">
<!-- Origin Point -->
<circle class="shadow-lg" cx="150" cy="200" fill="#191c1e" r="8"></circle>
<circle cx="150" cy="200" fill="white" r="4"></circle>
<!-- Destin Point -->
<circle class="location-dot" cx="250" cy="450" fill="#006e2a" r="10"></circle>
<circle cx="250" cy="450" fill="white" r="4"></circle>
<!-- Path -->
<path class="route-path" d="M 150 200 Q 180 300 250 450" fill="none" stroke="#00c853" stroke-linecap="round" stroke-width="4"></path>
</svg>
<!-- Floating Location Tooltips -->
<div class="absolute left-[80px] top-[160px] bg-surface p-2 px-3 rounded-xl shadow-lg border border-outline-variant/30 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[18px]">radio_button_checked</span>
<span class="font-label-lg text-on-surface truncate max-w-[120px]">Calle El Mirador</span>
</div>
<div class="absolute left-[200px] top-[480px] bg-surface p-2 px-3 rounded-xl shadow-lg border border-outline-variant/30 flex items-center gap-2">
<span class="material-symbols-outlined text-error text-[18px]">location_on</span>
<span class="font-label-lg text-on-surface truncate max-w-[120px]">Multiplaza</span>
</div>
</div>
</main>
<!-- Bottom Sheet -->
<div class="fixed bottom-0 left-0 right-0 z-[60] h-[60%] glass-sheet rounded-t-[32px] shadow-[0_-8px_40px_rgba(0,0,0,0.12)] border-t border-white/20 transition-transform duration-500 ease-out" id="bottom-sheet">
<!-- Grabber -->
<div class="w-full flex justify-center pt-3 pb-2">
<div class="w-10 h-1.5 bg-outline-variant rounded-full opacity-50"></div>

<!-- Header -->
<div class="py-4">

</div>

<div class="w-14 h-14 bg-primary-container/10 rounded-xl flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="motorcycle">motorcycle</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-0.5">

<div class="flex justify-between items-center">

</div>

<div class="ride-card flex items-center p-4 bg-surface/50 border border-outline-variant/20 rounded-2xl cursor-pointer hover:bg-surface-container-high transition-all active:scale-[0.98]" onclick="selectRide(this)">
<div class="w-14 h-14 bg-secondary-container/10 rounded-xl flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="motorcycle">motorcycle</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-0.5">
<span class="font-title-lg text-title-lg text-on-surface">MotoSV Plus</span>

<span class="font-body-md text-on-surface-variant">Prioridad máxima</span>

</div>
</div>
</div>
</div>
<!-- Payment & Confirmation Section -->
<div class="pt-4 pb-8 space-y-4">
<!-- Payment Selector -->
<div class="flex items-center justify-between bg-surface-container-low p-4 rounded-xl border border-outline-variant/10">

</div>

</div>
</div>
<button class="text-primary font-label-lg hover:underline transition-all">Cambiar</button>
</div>
<!-- Main CTA -->
<button class="w-full h-14 bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-bold text-lg rounded-2xl shadow-[0_4px_24px_rgba(0,200,83,0.3)] transition-all active:scale-[0.97] flex items-center justify-center gap-3" id="confirm-btn">
                    Confirmar MotoSV
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        function selectRide(element) {
            // Remove active class from all
            document.querySelectorAll('.ride-card').forEach(card => {
                card.classList.remove('ride-option-active', 'bg-primary-container/5');
            });
            
            // Add active class to selected
            element.classList.add('ride-option-active');
            
            // Subtle haptic feedback simulation
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Floating interaction for the button
        const confirmBtn = document.getElementById('confirm-btn');
        confirmBtn.addEventListener('click', () => {
            confirmBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-on-primary-container" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Buscando conductor...
            `;
            confirmBtn.classList.remove('bg-primary-container');
            confirmBtn.classList.add('bg-on-surface', 'text-surface');
            
            setTimeout(() => {
                confirmBtn.innerHTML = '¡Conductor asignado!';
                confirmBtn.classList.replace('bg-on-surface', 'bg-tertiary-container');
                confirmBtn.classList.replace('text-surface', 'text-on-tertiary-container');
            }, 2000);
        });

        // Intro animation
        window.addEventListener('DOMContentLoaded', () => {
            const sheet = document.getElementById('bottom-sheet');
            sheet.style.transform = 'translateY(100%)';
            setTimeout(() => {
                sheet.style.transform = 'translateY(0)';
            }, 300);
        });
    </script>
