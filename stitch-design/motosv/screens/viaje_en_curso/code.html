<script>
        // Bottom Sheet Drag Simulation
        const sheet = document.getElementById('bottomSheet');
        let startY = 0;
        let currentY = 0;
        let isDragging = false;

        sheet.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            isDragging = true;
            sheet.classList.remove('bottom-sheet-transition');
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaY = e.touches[0].clientY - startY;
            if (deltaY > 0) { // Only allow dragging down
                currentY = deltaY;
                sheet.style.transform = `translateY(${deltaY}px)`;
            }
        });

        document.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            sheet.classList.add('bottom-sheet-transition');
            
            if (currentY > 150) {
                // Peek state
                sheet.style.transform = 'translateY(70%)';
            } else {
                // Full state
                sheet.style.transform = 'translateY(0)';
            }
            currentY = 0;
        });

        // Simple vibration simulation on SOS button
        const sosBtn = document.querySelector('.bg-error-container');
        sosBtn.addEventListener('click', () => {
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }
            alert('Activando protocolo de seguridad MotoSV. Contactando autoridades y contactos de confianza...');
        });

        // Atmosphere - pulsing map marker
        setInterval(() => {
            const marker = document.querySelector('.w-6.h-6.rounded-full.bg-primary');
            marker.style.transform = `scale(${1 + Math.random() * 0.05})`;
        }, 1000);
    </script>
